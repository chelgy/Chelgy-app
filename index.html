<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicons & app icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111111" />

    <!-- iOS "add to home screen" behavior -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chelgy" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO -->
    <title>Chelgy — Your AI Marketing Platform</title>
    <meta name="description" content="Chelgy is your all-in-one AI marketing platform. Build your brand, content, ads, product photos, videos, and a full website — all in one place." />
    <link rel="canonical" href="https://chelgy.app/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, WhatsApp, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chelgy" />
    <meta property="og:title" content="Chelgy — Your AI Marketing Platform" />
    <meta property="og:description" content="Build your brand, content, ads, product photos, videos, and a full website — all in one place, powered by AI." />
    <meta property="og:url" content="https://chelgy.app/" />
    <meta property="og:image" content="https://chelgy.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chelgy — your all-in-one AI marketing platform" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chelgy — Your AI Marketing Platform" />
    <meta name="twitter:description" content="Build your brand, content, ads, product photos, videos, and a full website — all in one place, powered by AI." />
    <meta name="twitter:image" content="https://chelgy.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
